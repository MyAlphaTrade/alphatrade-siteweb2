<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JQR0P1GWEX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-JQR0P1GWEX');
</script>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — AlphaTrade</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav" id="mainNav">
  <a href="index.html" class="nav-logo">
    <img src="assets/logo.png" alt="AlphaTrade" onerror="this.style.display='none'">
    AlphaTrade
  </a>
  <div class="nav-links"></div>
  <div class="nav-cta"></div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="" onerror="this.style.display='none'">
      <span>AlphaTrade</span>
    </div>
    <h1>Connexion</h1>
    <p class="sub">Accédez à votre espace client.</p>

    <div class="form-group">
      <label class="form-label">Adresse email</label>
      <input class="form-input" type="email" id="email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p style="text-align:right;margin:-6px 0 4px"><a href="mot-de-passe-oublie.html" style="font-size:12.5px;color:var(--muted)">Mot de passe oublié ?</a></p>

    <div class="form-error" id="errMsg"></div>

    <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="doLogin()">
      Se connecter →
    </button>
    <p class="form-link">Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement</a></p>
  </div>
</div>

<div id="notif"></div>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
if (getToken()) window.location.href = 'espace-client.html';

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Veuillez remplir tous les champs.';
    errEl.style.display = 'block'; return;
  }
  try {
    const data = await apiPost('/auth/login', { email, password });
    saveSession(data.token, data.user, data.plan);
    notify('Connexion réussie !', 'green');
    setTimeout(() => { window.location.href = 'espace-client.html'; }, 500);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
</script>
<script src="js/bg.js"></script>
</body>
</html>
